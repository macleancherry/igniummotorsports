<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ignium Live Race Control</title>
  <desc id="desc">Branded hero image for Ignium Motorsport race timing launch.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05070d"/>
      <stop offset="50%" stop-color="#0b1324"/>
      <stop offset="100%" stop-color="#05070d"/>
    </linearGradient>
    <linearGradient id="blueBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f6bff"/>
      <stop offset="100%" stop-color="#32a1ff"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111a30" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#0a1020" stop-opacity="0.92"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21304d" stroke-width="1" opacity="0.45"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)"/>

  <path d="M0 730 L450 600 L920 760 L1600 560 L1600 900 L0 900 Z" fill="#08101e" opacity="0.9"/>
  <path d="M0 760 L500 640 L930 800 L1600 600" stroke="url(#blueBand)" stroke-width="3" fill="none" opacity="0.9"/>
  <path d="M0 790 L530 670 L950 830 L1600 640" stroke="#1d3f7f" stroke-width="2" fill="none" opacity="0.65"/>

  <rect x="90" y="80" width="1420" height="78" rx="16" fill="#0a1224" stroke="#274879" stroke-width="2"/>
  <text x="130" y="129" font-family="Segoe UI, Arial, sans-serif" font-size="40" font-weight="800" fill="#ecf4ff">IGNIUM LIVE RACE CONTROL</text>
  <text x="1170" y="129" font-family="Consolas, 'Courier New', monospace" font-size="28" font-weight="700" fill="#7fc5ff">STATUS: LIVE</text>

  <rect x="90" y="190" width="760" height="520" rx="22" fill="url(#card)" stroke="#2a4d82" stroke-width="2"/>
  <rect x="110" y="220" width="720" height="42" rx="8" fill="#0f1930"/>
  <text x="130" y="248" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#8fd1ff">POS</text>
  <text x="230" y="248" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#8fd1ff">DRIVER</text>
  <text x="520" y="248" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#8fd1ff">BEST LAP</text>
  <text x="700" y="248" font-family="Consolas, 'Courier New', monospace" font-size="22" fill="#8fd1ff">GAP</text>

  <g font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#ecf4ff">
    <rect x="110" y="278" width="720" height="56" rx="8" fill="#10213c"/>
    <text x="132" y="314" fill="#59b4ff">01</text><text x="230" y="314">M. CHERRY</text><text x="520" y="314">1:46.832</text><text x="700" y="314" fill="#79ffbb">LEADER</text>

    <rect x="110" y="344" width="720" height="56" rx="8" fill="#0f1d35"/>
    <text x="132" y="380" fill="#7fc5ff">02</text><text x="230" y="380">S. FERREIRA</text><text x="520" y="380">1:47.011</text><text x="700" y="380" fill="#c9d9ef">+0.179</text>

    <rect x="110" y="410" width="720" height="56" rx="8" fill="#0f1d35"/>
    <text x="132" y="446" fill="#7fc5ff">03</text><text x="230" y="446">L. JONES</text><text x="520" y="446">1:47.364</text><text x="700" y="446" fill="#c9d9ef">+0.532</text>

    <rect x="110" y="476" width="720" height="56" rx="8" fill="#0f1d35"/>
    <text x="132" y="512" fill="#7fc5ff">04</text><text x="230" y="512">B. MAROTEL</text><text x="520" y="512">1:47.590</text><text x="700" y="512" fill="#c9d9ef">+0.758</text>

    <rect x="110" y="542" width="720" height="56" rx="8" fill="#0f1d35"/>
    <text x="132" y="578" fill="#7fc5ff">05</text><text x="230" y="578">TEAM IGNIUM #22</text><text x="520" y="578">1:47.942</text><text x="700" y="578" fill="#ffd37d">PIT IN</text>
  </g>

  <rect x="910" y="190" width="600" height="520" rx="22" fill="url(#card)" stroke="#2a4d82" stroke-width="2"/>
  <text x="950" y="280" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="900" fill="#ffffff">RACE TIMING</text>
  <text x="950" y="340" font-family="Segoe UI, Arial, sans-serif" font-size="60" font-weight="900" fill="url(#blueBand)">REIMAGINED</text>

  <text x="950" y="430" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600" fill="#d4e6ff">Live timing, driver context, and instant race insight</text>
  <text x="950" y="472" font-family="Segoe UI, Arial, sans-serif" font-size="30" font-weight="600" fill="#d4e6ff">for every session in one control room.</text>

  <g filter="url(#glow)">
    <rect x="950" y="536" width="430" height="74" rx="14" fill="url(#blueBand)"/>
    <text x="978" y="584" font-family="Segoe UI, Arial, sans-serif" font-size="36" font-weight="900" fill="#041227">IGNIUM MOTORSPORT</text>
  </g>

  <text x="90" y="845" font-family="Consolas, 'Courier New', monospace" font-size="24" fill="#5f89bf">Telemetry. Timing. Team Intelligence.</text>
</svg>
